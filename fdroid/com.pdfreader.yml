Summary: Open-source PDF reader and editor for Android
Description: |
  PDF Reader is an open-source Android app for viewing and annotating PDF files.
  
  Current beta includes:
  * Fast PDF viewing
  * Page mode and continuous scroll mode
  * Pinch zoom with bounded pan
  * Text extraction and copy
  * Basic highlight annotations
  * Night mode
  * Tablet-adaptive layout

