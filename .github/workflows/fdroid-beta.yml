name: F-Droid Beta Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'beta-v*'

jobs:
  fdroid-beta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android dependencies
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.2.11394342" "cmake;3.22.1"

      - name: Build F-Droid beta package
        run: |
          chmod +x scripts/release-beta-fdroid.sh
          ./scripts/release-beta-fdroid.sh

      - name: Upload F-Droid beta artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-beta-artifacts
          path: dist/fdroid-beta/
